  78: clone
  86: clone

# =================================================================
# === Tone-pairs для anti-monotony rule в Layout Designer'е ===
# =================================================================
# При длинной презентации (>5 слайдов): чередовать light/dark/green divider'ы
# Никогда не использовать один тип donor'а более 2 раз подряд.

tone_groups:
  light_content: [21, 28, 29, 31, 34, 42, 53, 73, 81]
  dark_content:  [22, 41, 47, 48, 57, 67]
  green_accent:  [8, 12, 25, 62, 95]
  divider:       [10, 12, 13, 62]
  kpi:           [43, 44]
  title:         [4, 5, 6, 7, 8, 40]
  table:         [53, 54]
  diagram:       [47]
  image:         [39, 40, 73, 79, 81, 86]
  callout:       [41, 42]

# === Category groups (для anti-monotony в Layout Designer) ===
# Каждая группа = эквивалентные доноры одной семантики.
# Layout Designer не должен использовать donor одной группы > 2 раз подряд.
category_equivalence:
  title_open:    [4, 5, 40]            # открывающий БЕЛЫЙ титул
  title_dark:    [6, 7, 8]              # ТЁМНЫЙ титул (#6 исправлен из title_white_alt)
  divider:       [12, 13, 62]          # переход между разделами
  content_2col:  [28]
  content_3col:  [34]
  content_4block: [29]
  content_text:  [21, 22]
  callout:       [41, 42]
  kpi:           [43, 44]
  diagram:       [47]              # 48 убран из generic — у него PNG-картинка, использовать только при наличии image_path
  table:         [53, 54]
  image_grid:    [39, 81]                # 79 убран — fixed PNG content, нет editable text для 5 точек
  image_main:    [73, 86]                # IMAGE = ГЛАВНЫЙ КОНТЕНТ слайда (график, фото, скриншот)
  screenshot:    [73, 72]
  team:          []                     # 49/50/51/71 не подходят — фотографии в PNG, не редактируется
  timeline:      [60]                    # 60 размечен. 61 — line chart, для финансов специальный кейс
  logo_finale:   [25, 78, 86]
