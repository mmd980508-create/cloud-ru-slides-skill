  # ============
  # === Legend ===
  # ============
  # Поля slot:
  #   shape_idx — позиция в slide.shapes (build получает по индексу)
  #   size_pt   — размер шрифта в эталоне (build_v5 не меняет, если override не указан)
  #   color     — HEX (build_v5 применяет если override)
  #   bold      — bool (build_v5 не меняет, если override не указан)
  #   max_chars — справочно для Layout Designer'а (если текст длиннее — выбрать другого донора)
  #   optional  — slot можно не заполнять (заглушка остаётся)

# =================================================================
# === Generation method per donor (XML-инспекция от 2026-05-02) ===
# =================================================================
# Какой метод используется в build_v6 для каждого донора.
#
# clone        — копировать целиком слайд из шаблона (со всеми shapes), потом подменить text
# add_layout   — add_slide(layout_idx); декор наследуется автоматически из slideLayout*.xml
#
# Правило выбора:
#   - shapes_count в эталоне ≤ 4 → проверить, не лежат ли декоры в layout
#     если да → add_layout (быстрее, легче файл)
#   - shapes_count ≥ 8 или есть PNG-картинки на slide → clone (тащить всё)
#
# Замеры из template-slides-catalog.json + XML-инспекции:
#   slide  5 (title 5):              clone  (8 prstGeom + 3D PNG)
#   slide  6 (title 6 dark!):        clone  (нужен фон + footer)
#   slide  8 (title 8 dark+3D):      clone
#   slide 12 (divider green ЛЛЛЛ):   clone  (100 prstGeom! паттерн на slide)
#   slide 13 (divider dark):         clone  (паттерн на slide)
#   slide 25 (logo green):           clone  (3D-картинка на slide)
#   slide 28 (2col):                 add_layout (декор минимальный, в layout)
#   slide 29 (4 subtitles):          add_layout
#   slide 34 (3col):                 add_layout (бракеты-сепараторы наследуются из layout31)
#   slide 41 (callout dark):         add_layout (декор полностью в layout23 для callout dark)
#   slide 42 (callout white):        add_layout (декор полностью в slideLayout24.xml — облака+ромбики)
#   slide 43 (KPI 3 numbers):        clone  (18 prstGeom на slide)
#   slide 44 (KPI dark):             clone
#   slide 78 (logo + 3D):            clone  (3D на slide)
#
# Ключевой инсайт: callout 42 при clone весит 25MB; при add_layout — 1MB.
# Для divider 12 разница меньше (паттерн ЛЛЛЛ всё равно надо тащить).

donor_generation_method:
  4:  clone
  5:  clone
  6:  clone
  7:  clone
  8:  clone
  10: add_layout
  12: clone
  13: clone
  21: add_layout
  22: add_layout
  25: clone
  28: add_layout
  29: add_layout
  33: add_layout
  34: add_layout
  35: add_layout
  39: clone        # 7 PNG cards в slide
  40: clone        # PNG illustration
  41: add_layout
  42: add_layout
  43: clone
  44: clone
  47: clone        # сложная диаграмма
  48: clone        # Венн диаграмма с PNG
  53: add_layout   # таблица минималистичная
  54: add_layout   # большая таблица
  60: clone
  61: clone
  62: clone        # с большим текстом
  71: clone
  72: clone
  73: clone
  79: clone        # 3D PNG
